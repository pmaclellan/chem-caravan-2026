<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icon Comparison — Yao Guai & Radscorpion</title>
<style>
  :root {
    --pip-bg: #b89a52;
    --pip-bg-light: #e2cfa0;
    --pip-green: #2c4a10;
    --pip-green-dim: #6a5828;
    --pip-amber: #c4501a;
    --pip-border: #8a6020;
    --pip-border-dim: #cdb070;
    --pip-blue: #2a5a8a;
  }
  body {
    background: var(--pip-bg);
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    gap: 32px;
  }
  h1 {
    color: var(--pip-green);
    font-family: Georgia, serif;
    letter-spacing: 0.15em;
    font-size: 1.1rem;
    margin: 0;
  }
  .pairs {
    display: flex;
    gap: 48px;
  }
  .pair {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .pair-label {
    color: var(--pip-green);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .icons-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .icon-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .icon-box span {
    color: var(--pip-green-dim);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
  }
  /* Combat SVG — inline, uses currentColor */
  .combat-svg {
    color: var(--pip-green);
    width: 56px;
    height: 56px;
    background: color-mix(in srgb, var(--pip-bg-light) 80%, transparent);
    border: 1px solid var(--pip-border-dim);
    border-radius: 6px;
    padding: 6px;
    box-sizing: border-box;
  }
  /* Achievement icon card */
  .achievement-card {
    width: 120px;
    background: var(--pip-bg-light);
    border: 1px solid var(--pip-border-dim);
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .achievement-card.earned {
    border-color: var(--pip-amber);
    background: color-mix(in srgb, var(--pip-bg-light) 90%, var(--pip-amber));
  }
  .achievement-card .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .achievement-card img {
    width: 28px;
    height: 28px;
    opacity: 0.85;
  }
  .achievement-card .xp {
    color: var(--pip-blue);
    font-size: 0.7rem;
    font-weight: bold;
  }
  .achievement-card .name {
    color: var(--pip-amber);
    font-family: Georgia, serif;
    font-size: 0.75rem;
    font-weight: bold;
    line-height: 1.2;
  }
  .achievement-card .desc {
    color: var(--pip-green-dim);
    font-size: 0.6rem;
    line-height: 1.3;
  }
  .achievement-card .earned-tag {
    color: var(--pip-green-dim);
    font-size: 0.6rem;
  }

  .vs {
    color: var(--pip-border);
    font-size: 0.75rem;
    align-self: center;
    padding-top: 12px;
  }
  .divider {
    width: 1px;
    height: 120px;
    background: var(--pip-border-dim);
    align-self: center;
  }
</style>
</head>
<body>

<h1>YAO GUAI &amp; RADSCORPION — COMBAT SVG vs ACHIEVEMENT ICON</h1>

<div class="pairs">

  <!-- Yao Guai pair -->
  <div class="pair">
    <div class="pair-label">Yao Guai</div>
    <div class="icons-row">
      <div class="icon-box">
        <svg class="combat-svg" viewBox="0 0 48 48">
          <path d="M12 28C12 16 14 10 20 8C26 6 34 10 40 14C44 16 46 20 46 26C46 32 40 38 28 38C18 38 12 36 12 28Z" fill="currentColor"/>
          <path d="M1 20C1 16 6 13 12 13C15 14 16 19 14 23C11 26 5 26 2 23C1 22 1 20 1 20Z" fill="currentColor"/>
          <path d="M3 30C3 34 7 38 11 36C14 34 14 30 12 29C9 29 5 29 3 30Z" fill="currentColor"/>
          <path d="M6 25L5 29M9 25L9 29M11 25L11 29" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="14" y="36" width="6" height="10" rx="3" fill="currentColor"/>
          <rect x="22" y="38" width="5" height="8" rx="2" fill="currentColor"/>
          <rect x="32" y="38" width="5" height="8" rx="2" fill="currentColor"/>
          <rect x="40" y="36" width="5" height="10" rx="2" fill="currentColor"/>
          <path d="M11 46L8 48M14 46L13 48M17 46L17 48M20 46L21 48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M20 46L18 48M23 46L22 48M26 46L26 48M29 46L30 48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M30 46L28 48M34 46L33 48M38 46L38 48M42 46L43 48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span>combat SVG</span>
      </div>

      <div class="vs">→</div>

      <div class="icon-box">
        <div class="achievement-card earned">
          <div class="top-row">
            <img src="public/assets/icons/angry_bear_head.svg" alt="bear" />
            <span class="xp">+150</span>
          </div>
          <div class="name">Bear Tamer</div>
          <div class="earned-tag">Earned T12</div>
        </div>
        <span>achievement card</span>
      </div>

      <div class="icon-box">
        <div class="achievement-card">
          <div class="top-row">
            <img src="public/assets/icons/angry_bear_head.svg" alt="bear" style="opacity:0.4" />
            <span class="xp" style="opacity:0.4">+150</span>
          </div>
          <div class="name" style="color:var(--pip-green-dim)">Bear Tamer</div>
          <div class="desc">Tame a Yao Guai.</div>
        </div>
        <span>locked</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Radscorpion pair -->
  <div class="pair">
    <div class="pair-label">Radscorpion</div>
    <div class="icons-row">
      <div class="icon-box">
        <svg class="combat-svg" viewBox="0 0 48 48">
          <ellipse cx="22" cy="33" rx="13" ry="9" fill="currentColor"/>
          <ellipse cx="19" cy="21" rx="8" ry="6" fill="currentColor"/>
          <path d="M11 19 L3 13 L4 18 L11 23 Z" fill="currentColor"/>
          <path d="M11 23 L3 27 L4 31 L11 27 Z" fill="currentColor"/>
          <path d="M27 19 L33 12 L35 17 L27 23 Z" fill="currentColor"/>
          <path d="M27 23 L34 27 L33 31 L27 27 Z" fill="currentColor"/>
          <rect x="10" y="29" width="5" height="3" rx="1" fill="currentColor" transform="rotate(-20 12 30)"/>
          <rect x="20" y="31" width="5" height="3" rx="1" fill="currentColor" transform="rotate(-5 22 32)"/>
          <rect x="28" y="29" width="5" height="3" rx="1" fill="currentColor" transform="rotate(20 30 30)"/>
          <path d="M32 30 C38 26 44 18 42 9 C40 3 35 1 32 5" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
          <polygon points="32,5 28,1 36,1" fill="currentColor"/>
        </svg>
        <span>combat SVG</span>
      </div>

      <div class="vs">→</div>

      <div class="icon-box">
        <div class="achievement-card earned">
          <div class="top-row">
            <img src="public/assets/icons/scorpion-svgrepo-com.svg" alt="scorpion" />
            <span class="xp">+200</span>
          </div>
          <div class="name">Venom Wrangler</div>
          <div class="earned-tag">Earned T9</div>
        </div>
        <span>achievement card</span>
      </div>

      <div class="icon-box">
        <div class="achievement-card">
          <div class="top-row">
            <img src="public/assets/icons/scorpion-svgrepo-com.svg" alt="scorpion" style="opacity:0.4" />
            <span class="xp" style="opacity:0.4">+200</span>
          </div>
          <div class="name" style="color:var(--pip-green-dim)">Venom Wrangler</div>
          <div class="desc">Tame a Radscorpion.</div>
        </div>
        <span>locked</span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
